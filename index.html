<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Coffee Map</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

  <style>
    #map { height: 100vh; }
  </style>
</head>
<body>
    <div style="position:absolute; top:10px; left:10px; z-index:1000; background:white; padding:8px; border-radius:6px;">
    <label for="varietyFilter">Filter by Variety:</label>
    <select id="varietyFilter">
        <option value="all">All</option>
    </select>
    </div>
  <div id="map"></div>

  <script>
    var map = L.map('map').setView([0, 20], 2);

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '&copy; OpenStreetMap contributors'
    }).addTo(map);

    // 🔥 ここからJSON読み込み
    fetch("data.json")
        .then(response => response.json())
        .then(data => {

            const filterSelect = document.getElementById("varietyFilter");
            let markers = [];

            // 品種一覧を自動取得
            const allVarieties = new Set();
            data.origins.forEach(origin => {
            origin.varieties.forEach(v => {
                allVarieties.add(v.name);
            });
            });

            allVarieties.forEach(variety => {
            const option = document.createElement("option");
            option.value = variety;
            option.textContent = variety;
            filterSelect.appendChild(option);
            });

            function renderMarkers(selectedVariety) {

            // 既存マーカー削除
            markers.forEach(marker => map.removeLayer(marker));
            markers = [];

            data.origins.forEach(origin => {

                const hasVariety = origin.varieties.some(v => 
                selectedVariety === "all" || v.name === selectedVariety
                );

                if (hasVariety) {

                const varietyList = origin.varieties
                    .map(v => `${v.name} (${v.genetic_group})`)
                    .join("<br>");

                const marker = L.marker([origin.lat, origin.lng])
                    .addTo(map)
                    .bindPopup(`
                    <strong>${origin.region}</strong><br>
                    ${origin.country}<br>
                    Altitude: ${origin.altitude_min}–${origin.altitude_max}m<br><br>
                    <strong>Varieties:</strong><br>
                    ${varietyList}
                    `);

                markers.push(marker);
                }
            });
        }

        // 初期表示
        renderMarkers("all");

        // フィルター変更時
        filterSelect.addEventListener("change", function() {
        renderMarkers(this.value);
        });

     });
    .catch(error => console.error("Error loading JSON:", error));
  </script>
</body>
</html>
