<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Coffee Map</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

  <style>
    #map { height: 100vh; }
  </style>
</head>
<body>
  <div id="map"></div>

  <script>
    var map = L.map('map').setView([0, 20], 2);

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '&copy; OpenStreetMap contributors'
    }).addTo(map);

    // 🔥 ここからJSON読み込み
    fetch("data.json")
    .then(response => response.json())
    .then(data => {
        data.origins.forEach(origin => {

        const varietyList = origin.varieties
            .map(v => `${v.name} (${v.genetic_group})`)
            .join("<br>");

        L.marker([origin.lat, origin.lng])
            .addTo(map)
            .bindPopup(`
            <strong>${origin.region}</strong><br>
            ${origin.country}<br>
            Altitude: ${origin.altitude_min}–${origin.altitude_max}m<br><br>
            <strong>Varieties:</strong><br>
            ${varietyList}
            `);
        });
    })
    .catch(error => console.error("Error loading JSON:", error));
  </script>
</body>
</html>
