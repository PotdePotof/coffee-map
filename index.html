<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Coffee Map</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

  <style>
    #map { height: 100vh; }
  </style>
</head>
<body>
    <div style="position:absolute; top:10px; left:10px; z-index:1000; background:white; padding:8px; border-radius:6px;">
    <label for="varietyFilter">Filter by Variety:</label>
    <select id="varietyFilter" multiple size="6">
        <option value="all">All</option>
    </select>
    </div>
  <div id="map"></div>

  <script>
    var map = L.map('map').setView([0, 20], 2);

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '&copy; OpenStreetMap contributors'
    }).addTo(map);

    // 🔥 ここからJSON読み込み
    fetch("data.json")
        .then(response => response.json())
        .then(data => {
            function getColor(group) {
                switch(group) {
                    case "Ethiopian Landrace": return "#2ca02c";
                    case "SL": return "#9467bd";
                    case "Bourbon": return "#1f77b4";
                    case "Typica": return "#17becf";
                    case "Catimor": return "#d62728";
                    default: return "#7f7f7f";
            }
            }

            const filterSelect = document.getElementById("varietyFilter");
            let markers = [];

            // 品種一覧を自動取得
            const allVarieties = new Set();
            data.origins.forEach(origin => {
            origin.varieties.forEach(v => {
                allVarieties.add(v.name);
            });
            });

            allVarieties.forEach(variety => {
            const option = document.createElement("option");
            option.value = variety;
            option.textContent = variety;
            filterSelect.appendChild(option);
            });

            function renderMarkers(selectedVarieties) {

                // 既存マーカー削除
                markers.forEach(marker => map.removeLayer(marker));
                markers = [];

                data.origins.forEach(origin => {

                    origin.varieties.forEach(v => {

                    if (
                        selectedVarieties.includes("all") ||
                        selectedVarieties.includes(v.name)
                    ) {

                        const marker = L.circleMarker([origin.lat, origin.lng], {
                        radius: 8,
                        fillColor: getColor(v.genetic_group),
                        color: "#000",
                        weight: 1,
                        fillOpacity: 0.8
                        })
                        .addTo(map)
                        .bindPopup(`
                        <strong>${origin.region}</strong><br>
                        ${origin.country}<br>
                        Altitude: ${origin.altitude_min}–${origin.altitude_max}m<br><br>
                        <strong>Variety:</strong> ${v.name}<br>
                        <strong>Genetic Group:</strong> ${v.genetic_group}
                        `);

                        markers.push(marker);
                    }

                    });

                });

        }

        // 初期表示
        renderMarkers(["all"]);

        // フィルター変更時
        filterSelect.addEventListener("change", function() {
            const selectedOptions = Array.from(this.selectedOptions).map(option => option.value);
            renderMarkers(selectedOptions);
        });

     })
     .catch(error => console.error("Error loading JSON:", error));
  </script>
</body>
</html>
